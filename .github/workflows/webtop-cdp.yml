name: Build webtop-cdp

on:
  push:
    paths:
      - 'webtop-cdp/**'
      - '.github/workflows/webtop-cdp.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: webtop-cdp
          push: true
          tags: ghcr.io/yorkane/webtop-cdp:latest
