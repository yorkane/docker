services:
  webtop-cdp:
    image: ghcr.io/yorkane/webtop-cdp
    container_name: webtop-cdp
    ports:
      - "${WEBTOP_PORT:-3001}:${WEBTOP_CONTAINER_PORT:-3001}" # Web 桌面端口 (3000为纯HTTP, 3001为HTTPS)
      - "${WEBTOP_CDP_PORT:-9227}:${WEBTOP_CDP_CONTAINER_PORT:-9223}" # CDP 控制端口 (9222为纯HTTP, 9223为HTTPS)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - CUSTOM_USER=${WEBTOP_USER:-}                           # Web 桌面用户名，空则无认证
      - PASSWORD=${WEBTOP_PASSWORD:-}                           # Web 桌面密码，空则无认证
      - CDP_TOKEN=${WEBTOP_CDP_TOKEN:-}                        # CDP 认证 Token（路径前缀）
      - CDP_TLS_CERT=${WEBTOP_CDP_TLS_CERT:-/config/ssl/cdp-cert.pem}
      - CDP_TLS_KEY=${WEBTOP_CDP_TLS_KEY:-/config/ssl/cdp-key.pem}
      # --- Selkies 画质 & 性能 ---
      - SELKIES_FRAMERATE=${SELKIES_FRAMERATE:-30}             # 最大帧率
      - SELKIES_ENCODER=${SELKIES_ENCODER:-jpeg}               # 编码器
      - SELKIES_JPEG_QUALITY=${SELKIES_JPEG_QUALITY:-80}       # JPEG 画质 1-100
      # --- 音频 ---
      - SELKIES_AUDIO_ENABLED=${SELKIES_AUDIO_ENABLED:-true}   # 默认开启音频
      - SELKIES_MICROPHONE_ENABLED=${SELKIES_MICROPHONE_ENABLED:-true}
      - SELKIES_AUDIO_BITRATE=${SELKIES_AUDIO_BITRATE:-320000}
      # --- 分辨率 ---
      - SELKIES_MANUAL_WIDTH=${SELKIES_MANUAL_WIDTH:-1280}
      - SELKIES_MANUAL_HEIGHT=${SELKIES_MANUAL_HEIGHT:-720}
      # --- 浏览器 ---
      - CHROME_ENABLE_GPU=${CHROME_ENABLE_GPU:-false}          # 是否启用软件 GPU 加速
      - CHROME_LANGUAGE=${CHROME_LANGUAGE:-zh-CN}              # 浏览器界面语言 (默认 zh-CN)
    volumes:
      - ./webtop-data:/config                                  # 用户数据持久化
    shm_size: "256m"
    security_opt:
      - seccomp:unconfined
    mem_limit: 1536m                                           # 硬限制 1.5GB，适合 2GB 服务器
    restart: unless-stopped

  postgres:
    image: ghcr.io/yorkane/postgres:latest
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Wasu@3.14
      - POSTGRES_DB=postgres
    volumes:
      - ./pg-data:/var/lib/postgresql/data
    restart: unless-stopped